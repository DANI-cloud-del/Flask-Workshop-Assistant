<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flask Workshop{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <a href="/" class="text-2xl font-bold text-indigo-600">Flask Workshop</a>
                <div class="space-x-4">
                    <a href="/" class="text-gray-700 hover:text-indigo-600 transition">Home</a>
                    <a href="/about" class="text-gray-700 hover:text-indigo-600 transition">About</a>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="bg-gray-800 text-white mt-16">
        <div class="container mx-auto px-4 py-6 text-center">
            <p>Built with Flask & Tailwind CSS 🚀</p>
        </div>
    </footer>
    
    <!-- AI Workshop Assistant Widget -->
    <!-- This adds a floating AI helper to your app! -->
    <script src="http://localhost:5002/widget.js"></script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
