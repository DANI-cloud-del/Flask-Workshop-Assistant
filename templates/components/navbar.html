<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Workshop Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* Custom Gradient Colors */
        :root {
            --primary: #00b4d8;
            --secondary: #48cae4;
        }
        
        /* Smooth Navigation Link Underline Effect */
        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00b4d8, #48cae4);
            transition: width 0.4s ease;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        .nav-link.active::after {
            width: 100%;
        }
        
        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* Mobile Menu Animation */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.3s ease-in-out;
        }
        
        .mobile-menu.open {
            transform: translateX(0);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-blue-50 min-h-screen">
    
    <!-- Futuristic Navbar -->
    <nav class="glass fixed top-0 left-0 right-0 z-50 border-b border-gray-200/50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                
                <!-- Logo Section -->
                <div class="flex items-center gap-3">
                    <!-- AI Logo Icon -->
                    <div class="relative w-10 h-10 rounded-xl bg-gradient-to-br from-[#00b4d8] to-[#48cae4] flex items-center justify-center shadow-lg shadow-[#00b4d8]/30">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" class="bi bi-robot" viewBox="0 0 16 16">
                            <path d="M6 12.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5M3 8.062C3 6.76 4.235 5.765 5.53 5.886a26.6 26.6 0 0 0 4.94 0C11.765 5.765 13 6.76 13 8.062v1.157a.93.93 0 0 1-.765.935c-.845.147-2.34.346-4.235.346s-3.39-.2-4.235-.346A.93.93 0 0 1 3 9.219zm4.542-.827a.25.25 0 0 0-.217.068l-.92.9a25 25 0 0 1-1.871-.183.25.25 0 0 0-.068.495c.55.076 1.232.149 2.02.193a.25.25 0 0 0 .189-.071l.754-.736.847 1.71a.25.25 0 0 0 .404.062l.932-.97a25 25 0 0 0 1.922-.188.25.25 0 0 0-.068-.495c-.538.074-1.207.145-1.98.189a.25.25 0 0 0-.166.076l-.754.785-.842-1.7a.25.25 0 0 0-.182-.135"/>
                            <path d="M8.5 1.866a1 1 0 1 0-1 0V3h-2A4.5 4.5 0 0 0 1 7.5V8a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1v1a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1v-.5A4.5 4.5 0 0 0 10.5 3h-2zM14 7.5V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.5A3.5 3.5 0 0 1 5.5 4h5A3.5 3.5 0 0 1 14 7.5"/>
                        </svg>
                    </div>
                    
                    <!-- Brand Name -->
                    <span class="text-xl font-bold bg-gradient-to-r from-[#00b4d8] to-[#48cae4] bg-clip-text text-transparent">
                        Flask AI
                    </span>
                </div>
                
                <!-- Desktop Navigation Links -->
                <div class="hidden md:flex items-center gap-8">
                    <a href="{{ url_for('home') }}" class="nav-link text-gray-700 hover:text-[#00b4d8] font-medium px-3 py-2 flex items-center gap-2">
                        <i class="bi bi-house-door text-lg"></i>
                        <span>Home</span>
                    </a>
                    <a href="{{ url_for('settings') }}" class="nav-link text-gray-700 hover:text-[#00b4d8] font-medium px-3 py-2 flex items-center gap-2">
                        <i class="bi bi-gear text-lg"></i>
                        <span>Settings</span>
                    </a>
                    
                    <!-- CTA Button -->
                    <a href="{{ url_for('logout') }}" class="px-6 py-2.5 bg-gradient-to-r from-[#00b4d8] to-[#48cae4] text-white font-medium rounded-full shadow-lg shadow-[#00b4d8]/30 hover:shadow-xl hover:shadow-[#00b4d8]/40 hover:-translate-y-0.5 transition-all duration-300 flex items-center gap-2">
                        <i class="bi bi-arrow-right-circle"></i>
                        <span>Logout</span>
                    </a>
                </div>
                
                <!-- Mobile Menu Button -->
                <button onclick="toggleMobileMenu()" class="md:hidden w-10 h-10 rounded-lg bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors">
                    <i id="menuIcon" class="bi bi-list text-2xl text-gray-700"></i>
                    <i id="closeIcon" class="bi bi-x-lg text-xl text-gray-700 hidden"></i>
                </button>
                
            </div>
        </div>
    </nav>
    
    <!-- Mobile Menu (Slide from Right) -->
    <div id="mobileMenu" class="mobile-menu fixed top-0 right-0 bottom-0 w-full sm:w-80 glass shadow-2xl z-40 md:hidden">
        <div class="flex flex-col h-full pt-20 px-6">
            
            <!-- Mobile Navigation Links -->
            <div class="flex flex-col gap-4">
                <a href="{{ url_for('home') }}" class="text-lg font-medium text-gray-700 hover:text-[#00b4d8] px-4 py-3 rounded-xl hover:bg-[#00b4d8]/5 transition-all flex items-center gap-3">
                    <i class="bi bi-house-door text-xl"></i>
                    <span>Home</span>
                </a>
                <a href="{{ url_for('settings') }}" class="text-lg font-medium text-gray-700 hover:text-[#00b4d8] px-4 py-3 rounded-xl hover:bg-[#00b4d8]/5 transition-all flex items-center gap-3">
                    <i class="bi bi-gear text-xl"></i>
                    <span>Settings</span>
                </a>
                
                <div class="h-px bg-gray-200 my-2"></div>
                
                <!-- Mobile CTA -->
                <a href="{{ url_for('chat') }}" class="px-6 py-3 bg-gradient-to-r from-[#00b4d8] to-[#48cae4] text-white font-medium rounded-xl shadow-lg shadow-[#00b4d8]/30 text-center hover:shadow-xl transition-all flex items-center justify-center gap-2">
                    <i class="bi bi-arrow-right-circle"></i>
                    <span>Start Chat Now</span>
                </a>
            </div>
            
        </div>
    </div>
    
    <!-- Overlay for Mobile Menu -->
    <div id="mobileOverlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/30 backdrop-blur-sm z-30 hidden md:hidden"></div>
    
    <!-- Add padding to body to account for fixed navbar -->
    
    
    <script>
        // Mobile Menu Toggle
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const overlay = document.getElementById('mobileOverlay');
            const menuIcon = document.getElementById('menuIcon');
            const closeIcon = document.getElementById('closeIcon');
            
            menu.classList.toggle('open');
            overlay.classList.toggle('hidden');
            menuIcon.classList.toggle('hidden');
            closeIcon.classList.toggle('hidden');
        }
        
        // Active Link Highlighting
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
        });
        
        // Close mobile menu on link click
        document.querySelectorAll('#mobileMenu a').forEach(link => {
            link.addEventListener('click', function() {
                toggleMobileMenu();
            });
        });
    </script>
    
</body>
</html>
