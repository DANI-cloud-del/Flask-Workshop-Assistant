<!-- AI Assistant - Search Bar Style -->
<div id="aiContainer" class="ai-container">
    
    <!-- Collapsed Pill Button -->
    <div class="ai-pill">
        
        <!-- Gold Floating Balls -->
        <div class="ai-balls">
            <div class="gold-ball ball-1"></div>
            <div class="gold-ball ball-2"></div>
            <div class="gold-ball ball-3"></div>
            <div class="gold-ball ball-4"></div>
        </div>
        
        <!-- AI Face -->
        <div class="ai-face">
            <div class="ai-eyes">
                <div class="ai-eye">
                    <div id="pillLeftPupil" class="ai-pupil"></div>
                </div>
                <div class="ai-eye">
                    <div id="pillRightPupil" class="ai-pupil"></div>
                </div>
            </div>
        </div>
        
        <!-- Status Text -->
        <span class="ai-status">Ask me anything</span>
        
        <!-- Search Icon Button -->
        <div class="ai-search-btn" onclick="expandSearchBar()">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
        </div>
        
    </div>
    
    <!-- Expanded Search Bar -->
    <div class="ai-search-bar">
        
        <!-- AI Watcher (Left) -->
        <div class="ai-watcher">
            <div class="ai-watcher-eyes">
                <div class="ai-watcher-eye">
                    <div id="watcherLeftPupil" class="ai-watcher-pupil"></div>
                </div>
                <div class="ai-watcher-eye">
                    <div id="watcherRightPupil" class="ai-watcher-pupil"></div>
                </div>
            </div>
        </div>
        
        <!-- Divider -->
        <div class="ai-divider"></div>
        
        <!-- Input Field -->
        <input 
            type="text" 
            id="aiSearchInput" 
            class="ai-input" 
            placeholder="Ask me anything..."
            onkeypress="if(event.key==='Enter') sendSearchMessage()"
        >
        
        <!-- Action Buttons -->
        <div class="ai-actions">
            
            <!-- Attach Button -->
            <button class="ai-attach-btn" onclick="openFileUpload()">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
            </button>
            
            <!-- Send Button -->
            <button class="ai-send-btn" onclick="sendSearchMessage()">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
                </svg>
            </button>
            
        </div>
        
    </div>
    
    <!-- Hidden File Input -->
    <input type="file" id="aiFileInput" style="display: none;" accept="image/*,application/pdf" multiple>
    
</div>
