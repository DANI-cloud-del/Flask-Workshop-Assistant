<!-- AI Assistant - Clean Search Bar -->
<div id="aiContainer" class="ai-container">
    
    <!-- Pill Button -->
    <div id="aiPill" class="ai-pill" onclick="toggleAI()">
        
        <!-- Gold Floating Balls -->
        <div class="ai-balls">
            <div class="gold-ball ball-1"></div>
            <div class="gold-ball ball-2"></div>
            <div class="gold-ball ball-3"></div>
            <div class="gold-ball ball-4"></div>
        </div>
        
        <!-- AI Face -->
        <div class="ai-face">
            <div class="ai-eyes">
                <div class="ai-eye">
                    <div id="leftPupil" class="ai-pupil"></div>
                </div>
                <div class="ai-eye">
                    <div id="rightPupil" class="ai-pupil"></div>
                </div>
            </div>
        </div>
        
        <!-- Status Text -->
        <span class="ai-status">Ask me anything</span>
        
    </div>
    
    <!-- Clean Search Bar (No AI Face) -->
    <div class="ai-search-bar">
        
        <!-- Mic Status Indicator -->
        <div id="aiMicStatus" class="ai-mic-status">
            <span>Listening...</span>
        </div>
        
        <!-- Input Field -->
        <input 
            type="text" 
            id="aiSearchInput" 
            class="ai-input" 
            placeholder="Ask me anything..."
            onkeypress="handleEnterKey(event)"
        >
        
        <!-- Action Buttons -->
        <div class="ai-actions">
            
            <!-- Attach Button -->
            <button class="ai-action-btn" onclick="openFileUpload()" title="Attach files">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
                </svg>
            </button>
            
            <!-- Mic Button -->
            <button id="aiMicBtn" class="ai-action-btn" onclick="toggleMic()" title="Voice input">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                </svg>
            </button>
            
            <!-- Send Button -->
            <button id="aiSendBtn" class="ai-send-btn" onclick="sendMessage()" title="Send" disabled>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
                </svg>
            </button>
            
        </div>
        
    </div>
    
    <!-- Hidden File Input -->
    <input type="file" id="aiFileInput" style="display: none;" accept="image/*,application/pdf,.doc,.docx,.txt" multiple>
    
</div>
