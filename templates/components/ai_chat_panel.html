<!-- AI Chat Panel Overlay -->
<div id="aiChatOverlay" class="ai-chat-overlay" onclick="if(event.target === this) closeChatPanel()">
    
    <!-- Chat Panel -->
    <div id="aiChatPanel" class="ai-chat-panel">
        
        <!-- Header with AI Watcher -->
        <div class="ai-chat-header">
            <div class="ai-chat-header-left">
                <div>
                    <div class="ai-chat-title">AI Assistant</div>
                    <div class="ai-chat-subtitle">Online</div>
                </div>
            </div>
            
            <!-- AI Watcher (Eyes follow mouse) -->
            <div id="aiWatcher" class="ai-watcher">
                <div class="ai-watcher-eyes">
                    <div class="ai-watcher-eye">
                        <div id="watcherLeftPupil" class="ai-watcher-pupil"></div>
                    </div>
                    <div class="ai-watcher-eye">
                        <div id="watcherRightPupil" class="ai-watcher-pupil"></div>
                    </div>
                </div>
            </div>
            
            <!-- Close Button -->
            <button class="ai-chat-close" onclick="closeChatPanel()">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        
        <!-- Messages Container -->
        <div id="aiChatMessages" class="ai-chat-messages">
            <!-- Messages will be dynamically added here -->
        </div>
        
        <!-- Input Area -->
        <div class="ai-chat-input-container">
            <input 
                type="text" 
                id="aiChatInput" 
                class="ai-chat-input" 
                placeholder="Type your message..."
                autocomplete="off"
            >
            <button class="ai-chat-send" onclick="sendChatMessage()">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                </svg>
            </button>
        </div>
        
    </div>
    
</div>
