<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flask Chat App{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- AI Assistant CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ai_assistant.css') }}">
    
    <!-- Extra CSS Block -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    {% include 'components/navbar.html' %}
    
    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Include AI Assistant Component -->
    {% include 'components/ai_assistant.html' %}

    <!-- Settings & TTS (load first so AI assistant can use them) -->
    <script src="{{ url_for('static', filename='js/settings.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tts.js') }}"></script>
    
    <!-- AI Assistant JavaScript -->
    <script src="{{ url_for('static', filename='js/ai_assistant.js') }}"></script>
    
</body>
</html>
