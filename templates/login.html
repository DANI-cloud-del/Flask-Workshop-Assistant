<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Add your custom color to Tailwind
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'custom-blue': '#ade8f4',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    
    <!-- Login Box - Centered -->
    <div class="bg-white p-10 rounded-xl shadow-2xl w-96 border-2 border-gray-200 hover:border-custom-blue hover:shadow-custom-blue/50 transition-all duration-500 hover:scale-105">

        
        <!-- Title -->
        <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">Welcome Back</h1>
        
        <!-- Form -->
        <form method="POST">
            <!-- Username Field -->
            <div class="mb-6">
                <label class="block text-gray-700 font-semibold mb-2">Username</label>
                <input 
                    type="text" 
                    name="username" 
                    placeholder="Enter your username"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-custom-blue transition-colors duration-300"
                    required
                >
            </div>
            
            <!-- Password Field -->
            <div class="mb-8">
                <label class="block text-gray-700 font-semibold mb-2">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Enter your password"
                    class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-custom-blue transition-colors duration-300"
                    required
                >
            </div>
            
            <!-- Login Button -->
            <button 
                type="submit"
                class="w-full bg-black text-white py-3 rounded-lg font-semibold hover:bg-custom-blue hover:text-black transition-all duration-300 transform hover:scale-105"
            >
                Login
            </button>
        </form>
        
        <!-- Divider -->
        <div class="flex items-center my-6">
            <div class="flex-1 border-t-2 border-gray-300"></div>
            <span class="px-4 text-gray-500 font-semibold">OR</span>
            <div class="flex-1 border-t-2 border-gray-300"></div>
        </div>
        
        <!-- Google Sign-In Button -->
        <a href = "/authorize">
        <button class="w-full bg-white border-2 border-gray-300 text-gray-700 py-3 rounded-lg font-semibold hover:border-custom-blue hover:bg-custom-blue transition-all duration-300 flex items-center justify-center gap-3 transform hover:scale-105">
            <!-- Google SVG Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z"/>
            </svg>
            Sign in with Google
        </button>
        </a>
        <!-- Footer Links -->
        <div class="text-center mt-6">
            <a href="#" class="text-sm text-gray-600 hover:text-custom-blue transition-colors">
                Forgot password?
            </a>
        </div>
        
    </div>
    
</body>
</html>
